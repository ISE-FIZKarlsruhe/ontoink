name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # PyPI versions are immutable. If a release is republished (e.g. you
          # edit the release notes on GitHub), the workflow re-fires and the
          # upload would otherwise 400 with "File already exists". This makes
          # such re-runs a no-op instead of a hard failure.
          skip-existing: true
