site_name: ontoink
site_url: https://ise-fizkarlsruhe.github.io/ontoink/
site_description: Interactive ontology visualization, SHACL validation & live TTL editing for MkDocs
site_author: Ebrahim Norouzi
repo_url: https://github.com/ISE-FIZKarlsruhe/ontoink
repo_name: ISE-FIZKarlsruhe/ontoink
edit_uri: ""

copyright: >
  Copyright &copy; 2026
  <a href="https://www.fiz-karlsruhe.de/en/forschung/information-service-engineering" target="_blank">ISE &ndash; FIZ Karlsruhe</a>

theme:
  name: material
  language: en
  favicon: assets/logo.svg
  logo: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Examples:
    - FOAF Person: examples/foaf-person.md
    - Schema.org Article: examples/schema-article.md
    - BFO Role Bearer: examples/role-bearer.md
    - BFO Role Realization: examples/role-realization.md
    - IAO Textual Entity: examples/textual-entity.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Cite: cite.md

plugins:
  - search
  - ontoink

markdown_extensions:
  - pymdownx.superfences:
      preserve_tabs: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ISE-FIZKarlsruhe/ontoink
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ontoink/
  generator: false

extra_css:
  - assets/extra.css
